<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HFI Connect</title>
<style>
  :root { --ink:#1b1620; --muted:#5d5667; --line:#e7e2ec; --brand:#F2682A; --bg:#fbf9fc; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.6; }
  .wrap { max-width:560px; margin:0 auto; padding:64px 24px; text-align:center; }
  h1 { font-size:2rem; margin:0 0 6px; }
  p { color:var(--muted); }
  .links { display:flex; gap:14px; justify-content:center; margin-top:28px; flex-wrap:wrap; }
  a.btn { text-decoration:none; background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:14px 22px; color:var(--ink); font-weight:600; }
  a.btn:hover { border-color:var(--brand); }
  footer { margin-top:48px; color:var(--muted); font-size:0.85rem; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>HFI Connect</h1>
    <p>The community app of Holy Fire Ministries.</p>
    <div class="links">
      <a class="btn" href="/privacy">Privacy Policy</a>
      <a class="btn" href="/support">Support</a>
    </div>
    <footer>
      © 2026 Holy Fire Ministries · <a href="mailto:holyfireministries.india@gmail.com" style="color:var(--brand)">holyfireministries.india@gmail.com</a>
    </footer>
  </div>
</body>
</html>
